
set-option -g default-shell /bin/zsh

# remap prefix to Control + a
set -g prefix C-a
# bind 'C-a C-a' to type 'C-a'
bind C-a send-prefix
unbind C-b

# mouse control
setw -g mouse on


# Pane navigation
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Pane creation and close
bind -n C-S-Enter split-window -c "#{pane_current_path}"
bind -n C-S-w kill-pane

# Window (tab) management
bind -n C-S-t new-window -c "#{pane_current_path}"
bind -n C-S-q kill-window
bind -n C-S-Left previous-window
bind -n C-S-Right next-window
bind -n C-S-, swap-window -t -1
bind -n C-S-. swap-window -t +1

# Layout cycling
bind -n C-S-l next-layout
bind -n C-S-z next-layout

# Focus pane traversal and pane swapping
bind -n C-S-[ select-pane -t :.-
bind -n C-S-] select-pane -t :.+
bind -n C-S-f swap-pane -D
bind -n C-S-b swap-pane -U

# Resize mode (similar to multiplexer resize workflows)
bind -n C-S-r switch-client -T resize_mode
bind -T resize_mode h resize-pane -L 5
bind -T resize_mode j resize-pane -D 3
bind -T resize_mode k resize-pane -U 3
bind -T resize_mode l resize-pane -R 5
bind -T resize_mode Left resize-pane -L 5
bind -T resize_mode Down resize-pane -D 3
bind -T resize_mode Up resize-pane -U 3
bind -T resize_mode Right resize-pane -R 5
bind -T resize_mode Enter switch-client -T root
bind -T resize_mode Escape switch-client -T root

# Scrollback controls (enter copy-mode and scroll)
bind -n C-S-h copy-mode
bind -n C-S-Up copy-mode -e \; send-keys -X scroll-up
bind -n C-S-Down copy-mode -e \; send-keys -X scroll-down
bind -n C-S-PageUp copy-mode -e \; send-keys -X page-up
bind -n C-S-PageDown copy-mode -e \; send-keys -X page-down
bind -n C-S-Home copy-mode -e \; send-keys -X history-top
bind -n C-S-End copy-mode -e \; send-keys -X history-bottom

